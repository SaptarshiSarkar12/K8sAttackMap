    const elements = typeof graphData === 'object' ? graphData : { nodes: [], edges: [] };

    // Initialize Cytoscape
    const cy = cytoscape({
        container: document.getElementById('cy'),
        elements: elements,
        style: [
            { selector: 'node', style: { 'background-color': '#1f6feb', 'label': 'data(label)', 'color': '#c9d1d9', 'font-size': '10px', 'text-wrap': 'wrap', 'text-valign': 'bottom', 'text-margin-y': 5, 'width': 25, 'height': 25 } },
            { selector: 'edge', style: { 'width': 1.5, 'line-color': '#30363d', 'target-arrow-color': '#30363d', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'label': 'data(label)', 'font-size': '8px', 'color': '#8b949e', 'text-rotation': 'autorotate', 'text-background-opacity': 1, 'text-background-color': '#0d1117' } },
            { selector: '.critical-path', style: { 'line-color': '#ff7b72', 'target-arrow-color': '#ff7b72', 'width': 3, 'color': '#ff7b72', 'font-weight': 'bold', 'z-index': 10 } },
            { selector: 'node.critical-path', style: { 'border-color': '#ff7b72', 'border-width': 3 } },
            { selector: '.entry-node', style: { 'border-color': '#2ea043', 'border-width': 3, 'shape': 'hexagon', 'width': 30, 'height': 30 } },
            { selector: '.choke-point', style: { 'background-color': '#8b949e', 'border-width': 0, 'width': 35, 'height': 35, 'background-image': "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230d1117' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'%3E%3Cline x1='18' y1='6' x2='6' y2='18'/%3E%3Cline x1='6' y1='6' x2='18' y2='18'/%3E%3C/svg%3E", 'background-fit': 'contain', 'z-index': 100 } },
            { selector: '.blink-off', style: { 'opacity': 0.4 } },
            { selector: '.blasted', style: { 'underlay-color': '#ffa657', 'underlay-padding': 8, 'underlay-opacity': 0.8, 'background-color': '#ffa657', 'border-color': '#ffa657' } }
        ]
    });

    // Blinking Effect for Choke Point
    setInterval(() => cy.nodes('.choke-point').toggleClass('blink-off'), 800);

    // UI Toggles & Physics Layout
    const orphanNodes = cy.nodes().filter(node => node.degree() === 0);
    cy.remove(orphanNodes);

    const focusToggle = document.getElementById('focusToggle');

    const runPhysicsLayout = () => {
        cy.layout({
            name: 'fcose', quality: 'proof', randomize: true, animate: true, animationDuration: 1200,
            nodeRepulsion: 8000, idealEdgeLength: 150, edgeElasticity: 0.25, packComponents: true, step: "all"
        }).run();
    };

    const applyFocusEffect = () => {
        const backgroundElements = cy.elements().not('.critical-path').not('.entry-node').not('.choke-point');
        if (focusToggle.checked) {
            backgroundElements.animate({ style: { 'opacity': 0.25, 'text-opacity': 0.25 } }, { duration: 500 });
        } else {
            backgroundElements.animate({ style: { 'opacity': 1, 'text-opacity': 1 } }, { duration: 500 });
        }
    };

    focusToggle.addEventListener('change', applyFocusEffect);

    document.getElementById('orphanToggle').addEventListener('change', function(e) {
        if (e.target.checked) {
            cy.add(orphanNodes);
            orphanNodes.style(focusToggle.checked ? { 'opacity': 0.25, 'text-opacity': 0.25 } : { 'opacity': 1, 'text-opacity': 1 });
        } else {
            cy.remove(orphanNodes);
        }
        runPhysicsLayout();
    });

    // Initial Load
    runPhysicsLayout();

    // Tooltip & Blast Radius Hover
    const tooltip = document.getElementById('custom-tooltip');

    cy.on('mouseover', 'node', function(event) {
        const data = event.target.data();
        let html = `<div class="tooltip-title">${data.id}</div><b>Type:</b> ${data.type.toUpperCase()}<br>`;
        if (data.isEntry) html += `<div class="tooltip-blast">🔥 Entry Point (Configured Max Hops: 3)</div>`;
        if (data.isChokePoint) {
            html += `<div class="tooltip-alert">⚠️ RECOMMENDED CHOKE POINT</div>`;
            if (data.type === 'group') {
                html += `Groups are not K8s API objects and cannot be directly deleted.<br>Remediate by auditing and removing the <b>ClusterRoleBinding(s)</b> that grant this group elevated access.`;
            } else if (data.type === 'serviceaccount') {
                html += `Disable token auto-mount and scope permissions on this ServiceAccount to cut off attack paths.`;
            } else if (data.type === 'role' || data.type === 'clusterrole') {
                html += `Tighten the permissions granted by this Role to sever the most attack paths.`;
            } else {
                html += `Hardening or removing this node significantly reduces the blast radius.`;
            }
        }

        tooltip.innerHTML = html;
        tooltip.style.display = 'block';

        if (data.isEntry && data.blastRadiusIds) {
            data.blastRadiusIds.forEach(id => {
                const targetNode = cy.getElementById(id);
                if (targetNode) targetNode.addClass('blasted');
            });
        }
    });

    cy.on('mousemove', event => {
        tooltip.style.left = (event.originalEvent.pageX + 15) + 'px';
        tooltip.style.top = (event.originalEvent.pageY + 15) + 'px';
    });

    cy.on('mouseout', 'node', event => {
        tooltip.style.display = 'none';
        if (event.target.data('isEntry')) cy.nodes('.blasted').removeClass('blasted');
    });
