version: 2
updates:
  # Runtime, test dependencies, and build plugins
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(maven)"
    labels:
      - "dependencies 📦️"
      - "maven 📦️"
    groups:
      logging:
        patterns:
          - "ch.qos.logback:*"
          - "org.slf4j:*"
      testing:
        patterns:
          - "org.junit.jupiter:*"
      serialization:
        patterns:
          - "com.fasterxml.jackson.core:*"
      graph:
        patterns:
          - "org.jgrapht:*"
      pdf:
        patterns:
          - "com.itextpdf:*"
      cli:
        patterns:
          - "commons-cli:*"
      lombok:
        patterns:
          - "org.projectlombok:*"
      maven-core-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
      rewrite:
        patterns:
          - "org.openrewrite.*:*"
      graalvm:
        patterns:
          - "org.graalvm.buildtools:*"
      exec:
        patterns:
          - "org.codehaus.mojo:exec-maven-plugin"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      ci-workflow:
        patterns:
          - "*"