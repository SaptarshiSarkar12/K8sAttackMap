name: Build, Test and Package K8sAttackMap
on:
  push:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: Build with Maven
        run: mvn clean compile
      - name: Test with Maven
        run: mvn test
      - name: Extract version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  package:
    name: Package for ${{ matrix.os }}
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    permissions:
      contents: write # Required for SBOM generation from setup-graalvm action
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Oracle GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'
          native-image-job-reports: 'true'
          native-image-enable-sbom: 'true'
      - name: Build and Package with Maven
        run: mvn clean package -DskipTests
      - name: Tar executable
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXTENSION=".exe"
          else
            EXTENSION=""
          fi
          cd target
          OLD_NAME="K8sAttackMap${EXTENSION}"
          NEW_NAME="K8sAttackMap-${{ matrix.os }}${EXTENSION}"
          mv "$OLD_NAME" "$NEW_NAME"
          tar -cvf K8sAttackMap-${{ matrix.os }}.tar "$NEW_NAME"
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: K8sAttackMap-${{ matrix.os }}
          path: target/K8sAttackMap-${{ matrix.os }}.tar
          archive: false

  publish:
    if: github.event_name == 'workflow_dispatch'
    name: Publish Release
    needs: [ build-and-test, package ]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases and uploading assets
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true # Merges all artifacts into a single directory
      - name: Unpack artifacts
        run: |
          for file in *.tar; do
              tar -xvf "$file"
          done
      - name: Create Draft Release
        run: |
          gh release create "v${{ needs.build.outputs.version }}" \
            linux/* windows/* macos/* \
            --title "v${{ needs.build.outputs.version }}" \
            --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}