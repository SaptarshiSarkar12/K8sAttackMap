name: Build, Test and Package K8sAttackMap
on:
  push:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: Build and Test with Maven
        run: mvn clean compile # Add tests first, then come here to modify CI/CD pipeline

  package:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: write # Required for SBOM generation from setup-graalvm action
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Oracle GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'
          native-image-job-reports: 'true'
          native-image-enable-sbom: 'true'
      - name: Build and Package with Maven
        run: mvn clean package -DskipTests
      - name: Tar executable
        run: |
          cd target
          tar -cvf K8sAttackMap-${{ matrix.os }}.tar K8sAttackMap${{matrix.os == 'windows-latest' && '.exe' || ''}}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: K8sAttackMap-${{ matrix.os }}
          path: target/K8sAttackMap-${{ matrix.os }}.tar
          archive: false

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true # Merges all artifacts into a single directory
      - name: List downloaded artifacts
        run: ls -la
      - name: Unpack artifacts
        run: |
          mkdir linux windows macos
          for file in *.tar; do
            if [[ $file == *"ubuntu"* ]]; then
              tar -xvf "$file" -C linux
            elif [[ $file == *"windows"* ]]; then
              tar -xvf "$file" -C windows
            elif [[ $file == *"macos"* ]]; then
              tar -xvf "$file" -C macos
            fi
          done