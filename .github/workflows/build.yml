name: Build, Test and Package
on:
  push:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: Install Trivy
        run: |
          sudo apt-get install wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy
      - name: Build with Maven
        run: mvn clean compile
      - name: Test with Maven
        run: mvn test
      - name: Extract version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  pgo-profile:
    name: Generate PGO Profile
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Oracle GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'
      - name: Install Trivy
        run: |
          sudo apt-get install wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy
      - name: Build instrumented native image
        run: mvn clean package -DskipTests -P pgo-instrument
      - name: Run PGO workload
        run: bash scripts/run-pgo.sh target/K8sAttackMap
      - name: Ensure PGO profile exists
        run: test -f default.iprof
      - name: Upload PGO profile
        uses: actions/upload-artifact@v7
        with:
          path: default.iprof
          archive: 'false'

  package:
    name: Package for ${{ matrix.os }}
    needs: [ build-and-test, pgo-profile ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            ext: ''
          - os: ubuntu-24.04-arm
            os_name: linux
            ext: ''
          - os: windows-latest
            os_name: windows
            ext: '.exe'
          - os: macos-latest
            os_name: macos
            ext: ''
    permissions:
      contents: write # Required for SBOM generation from setup-graalvm action
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Oracle GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'
          native-image-job-reports: 'true'
          native-image-enable-sbom: 'true'
      - name: Download PGO profile
        uses: actions/download-artifact@v8
        with:
          name: default.iprof
      - name: Verify PGO profile present
        run: test -f default.iprof
      - name: Build and Package with Maven
        run: mvn clean package -DskipTests -P pgo-optimise
      - name: Tar executable
        shell: bash
        run: |
          RAW_ARCH=$(uname -m)
          ARCH=$( [[ "$RAW_ARCH" == "x86_64" ]] && echo "x86_64" || echo "arm64" )
          VERSION="${{ needs.build-and-test.outputs.version }}"
          cd target
          OLD_NAME="K8sAttackMap${{ matrix.ext }}"
          NEW_NAME="K8sAttackMap-v${VERSION}-${{ matrix.os_name }}-${ARCH}${{ matrix.ext }}"
          mv "$OLD_NAME" "$NEW_NAME"
          tar -cvf K8sAttackMap-${{ matrix.os }}.tar "$NEW_NAME"
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: K8sAttackMap-${{ matrix.os }}
          path: target/K8sAttackMap-${{ matrix.os }}.tar
          archive: false

  publish:
    if: github.event_name == 'workflow_dispatch'
    name: Publish Release
    needs: [ build-and-test, package ]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases and uploading assets
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true # Merges all artifacts into a single directory
      - name: Unpack artifacts
        shell: bash
        run: |
          for file in *.tar; do
              tar -xvf "$file"
          done
      - name: Create Draft Release
        run: |
          VERSION="${{ needs.build-and-test.outputs.version }}"
          gh release create "v$VERSION" \
            K8sAttackMap-v$VERSION-* \
            --title "K8sAttackMap v$VERSION" \
            --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}