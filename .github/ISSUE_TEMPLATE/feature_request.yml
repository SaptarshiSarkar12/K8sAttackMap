name: Feature request
description: Suggest an enhancement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I reviewed CONTRIBUTING.md and this request fits the project scope.
          required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem are you trying to solve? Who benefits and why?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: textarea
    id: impact
    attributes:
      label: Impact and priority
      description: Why is this important now? Any deadlines or urgency?
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, sample data, or references.
